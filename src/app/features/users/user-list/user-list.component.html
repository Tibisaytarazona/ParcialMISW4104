<section class="users-panel p-4 p-md-5">
  <header class="mb-4">
    <h2 class="mb-1">Users</h2>
    <p class="mb-0 panel-subtitle">Visual cards with roles and quick access.</p>
  </header>

  <p *ngIf="isLoading" class="status-text mb-0">Loading users...</p>

  <p *ngIf="hasError" class="status-text text-danger mb-0">
    We could not load users. Please try again.
  </p>

  <div *ngIf="!isLoading && !hasError" class="row g-4">
    <div class="col-12 col-md-6 col-xl-4" *ngFor="let user of users">
      <article class="card user-card h-100 shadow-sm">
        <div class="card-body d-flex flex-column">
          <div class="d-flex align-items-center gap-3 mb-3">
            <img [src]="user.avatarUrl" [alt]="user.name" class="avatar" />
            <div>
              <h5 class="mb-1">{{ user.name }}</h5>
              <p class="mb-0 user-username"><span>&#64;</span>{{ user.username }}</p>
            </div>
          </div>

          <span class="role-badge mb-3" [ngClass]="getRoleClass(user.role)">
            {{ user.role }}
          </span>

          <div class="mt-auto d-flex justify-content-end">
            <a class="btn btn-view" [routerLink]="['/users', user.id]" aria-label="View user details">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <span>View more</span>
            </a>
          </div>
        </div>
      </article>
    </div>
  </div>
</section>
