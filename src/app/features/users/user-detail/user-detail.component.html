<div class="detail-backdrop" (click)="onClose()"></div>

<section class="detail-modal" role="dialog" aria-modal="true" aria-label="User details">
  <header class="d-flex justify-content-between align-items-start gap-3 mb-3">
    <div class="d-flex align-items-center gap-3">
      <img *ngIf="user" [src]="user.avatarUrl" [alt]="user.name" class="detail-avatar" />
      <div>
        <h3 class="mb-0">{{ user?.name }}</h3>
        <p class="mb-0 text-muted"><span>&#64;</span>{{ user?.username }}</p>
      </div>
    </div>

    <button type="button" class="btn-close detail-close" aria-label="Close" (click)="onClose()"></button>
  </header>

  <dl class="detail-grid mb-0">
    <div>
      <dt>Email</dt>
      <dd>{{ user?.email }}</dd>
    </div>
    <div>
      <dt>Rol</dt>
      <dd class="text-capitalize">{{ user?.role }}</dd>
    </div>
    <div>
      <dt>Ubicacion</dt>
      <dd>{{ user?.location }}</dd>
    </div>
    <div>
      <dt>Repositorios</dt>
      <dd>{{ user?.repoIds?.length }}</dd>
    </div>
  </dl>
</section>
