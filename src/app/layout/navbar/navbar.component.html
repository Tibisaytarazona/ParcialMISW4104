<nav class="navbar navbar-expand-lg app-navbar">
  <div class="container">
    <a class="navbar-brand brand-text" routerLink="/users">Feature Hub</a>

    <button
      class="navbar-toggler"
      type="button"
      aria-controls="mainNavbar"
      [attr.aria-expanded]="isMenuOpen"
      aria-label="Toggle navigation"
      (click)="toggleMenu()"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar" [class.show]="isMenuOpen">
      <ul class="navbar-nav ms-auto gap-lg-2">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/users"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeMenu()"
          >
            Users
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/repositories"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeMenu()"
          >
            Repositories
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>
